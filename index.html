<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aide Rythmique</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.4rem; margin-bottom: 10px; color: #00ffcc; }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label { font-weight: bold; font-size: 0.9rem; color: #bbb; }
        input[type="number"], select {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }
        input[type="range"] {
            width: 90px;
            accent-color: #00ffcc;
            cursor: pointer;
        }
        .volume-val {
            font-size: 0.8rem;
            color: #00ffcc;
            min-width: 28px;
        }
        button {
            background: #00ffcc;
            color: #1a1a1a;
            border: none;
            padding: 8px 25px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background: #00ccaa; }
        .grid-container {
            position: relative;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }
        .row-label {
            width: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 11;
            background: #222;
        }
        .grid {
            display: grid;
            gap: 4px; /* Espace fin entre les rectangles comme sur les fiches */
            flex-grow: 1;
            position: relative;
        }
        .cell {
            width: 100%;
            height: 38px; /* Hauteur ajustée pour un ratio rectangle parfait */
            background: #3a3a3a;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.1s;
            box-sizing: border-box;
        }
        .row-md .cell.active { background: #ff5722; } /* Orange Main Droite */
        .row-mg .cell.active { background: #2196f3; } /* Bleu Main Gauche */
        
        #playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ffffff;
            box-shadow: 0 0 10px #ffffff;
            pointer-events: none;
            left: 40px;
            z-index: 10;
        }
        .time-labels {
            display: grid;
            gap: 4px;
            margin-left: 40px;
            margin-bottom: 5px;
            text-align: center;
            font-weight: bold;
            color: #888;
            font-size: 0.85rem;
        }
        .time-labels div {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>Aide Rythmique</h1>

    <div class="controls">
        <div class="controls-row">
            <div class="control-group">
                <label for="bpm">BPM :</label>
                <input type="number" id="bpm" value="60" min="40" max="240">
            </div>

            <div class="control-group">
                <label for="stepsSelect">Cases :</label>
                <select id="stepsSelect">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="6">6</option>
                    <option value="8" selected>8</option>
                    <option value="12">12</option>
                    <option value="16">16</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="volume">Vol :</label>
                <input type="range" id="volume" min="0" max="100" value="50">
                <span class="volume-val" id="volumeVal">50%</span>
            </div>

            <button id="playBtn">PLAY</button>
        </div>

        <div class="controls-row">
            <div class="control-group">
                <label for="soundMD">Son MD :</label>
                <select id="soundMD">
                    <option value="sine" selected>Bip Pur (Aigu)</option>
                    <option value="triangle">Claquement doux</option>
                    <option value="square">Arcade / Rétro</option>
                    <option value="sawtooth">Dents de scie</option>
                </select>
            </div>

            <div class="control-group">
                <label for="soundMG">Son MG :</label>
                <select id="soundMG">
                    <option value="sine">Bip Pur (Grave)</option>
                    <option value="triangle" selected>Claquement (Percu)</option>
                    <option value="square">Arcade / Rétro</option>
                    <option value="sawtooth">Dents de scie</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <div class="time-labels" id="timeLabels"></div>
        
        <div id="playhead"></div>

        <div class="row row-md">
            <div class="row-label">MD</div>
            <div class="grid" id="gridMD"></div>
        </div>

        <div class="row row-mg">
            <div class="row-label">MG</div>
            <div class="grid" id="gridMG"></div>
        </div>
    </div>

    <script>
        let totalSteps = 8;
        let isPlaying = false;
        
        let animationFrameId = null;
        let startTime = 0;
        let durationPerLoop = 0;
        let lastTriggeredStep = -1;
        
        const playBtn = document.getElementById('playBtn');
        const bpmInput = document.getElementById('bpm');
        const stepsSelect = document.getElementById('stepsSelect');
        const soundMDSelect = document.getElementById('soundMD');
        const soundMGSelect = document.getElementById('soundMG');
        const volumeInput = document.getElementById('volume');
        const volumeVal = document.getElementById('volumeVal');
        const playhead = document.getElementById('playhead');
        const gridMD = document.getElementById('gridMD');
        const gridMG = document.getElementById('gridMG');
        const timeLabels = document.getElementById('timeLabels');

        // Configuration Audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const mainGainNode = audioCtx.createGain();
        mainGainNode.connect(audioCtx.destination);

        // --- ENREGISTREMENT ET CHARGEMENT (LOCALSTORAGE) ---
        function saveSettings() {
            const activeMD = Array.from(gridMD.children).map(c => c.classList.contains('active'));
            const activeMG = Array.from(gridMG.children).map(c => c.classList.contains('active'));
            
            const settings = {
                bpm: bpmInput.value,
                totalSteps: stepsSelect.value,
                volume: volumeInput.value,
                soundMD: soundMDSelect.value,
                soundMG: soundMGSelect.value,
                gridStateMD: activeMD,
                gridStateMG: activeMG
            };
            localStorage.setItem('aideRythmique_settings', JSON.stringify(settings));
        }

        // --- GÉNÉRATION DYNAMIQUE DE LA GRILLE ---
        function buildGrid(savedMD = [], savedMG = []) {
            gridMD.innerHTML = '';
            gridMG.innerHTML = '';
            timeLabels.innerHTML = '';

            gridMD.style.gridTemplateColumns = `repeat(${totalSteps}, 1fr)`;
            gridMG.style.gridTemplateColumns = `repeat(${totalSteps}, 1fr)`;
            timeLabels.style.gridTemplateColumns = `repeat(${totalSteps}, 1fr)`;

            for (let i = 0; i < totalSteps; i++) {
                const label = document.createElement('div');
                label.innerText = i + 1;
                timeLabels.appendChild(label);

                const cellMD = document.createElement('div');
                cellMD.className = 'cell';
                if (savedMD[i]) cellMD.classList.add('active');
                cellMD.addEventListener('click', () => {
                    cellMD.classList.toggle('active');
                    saveSettings();
                });
                gridMD.appendChild(cellMD);

                const cellMG = document.createElement('div');
                cellMG.className = 'cell';
                if (savedMG[i]) cellMG.classList.add('active');
                cellMG.addEventListener('click', () => {
                    cellMG.classList.toggle('active');
                    saveSettings();
                });
                gridMG.appendChild(cellMG);
            }
            
            resetPlayhead();
        }

        function getTimelineDimensions() {
            const firstCell = gridMD.children[0];
            const lastCell = gridMD.children[gridMD.children.length - 1];
            if (!firstCell || !lastCell) return { startX: 40, totalWidth: 0 };

            const containerRect = document.querySelector('.grid-container').getBoundingClientRect();
            const firstRect = firstCell.getBoundingClientRect();
            const lastRect = lastCell.getBoundingClientRect();

            const startX = firstRect.left - containerRect.left;
            const totalWidth = lastRect.right - firstRect.left;

            return { startX, totalWidth };
        }

        function resetPlayhead() {
            setTimeout(() => {
                const dims = getTimelineDimensions();
                playhead.style.left = `${dims.startX}px`;
            }, 50);
        }

        function updateTimeline(timestamp) {
            if (!startTime) startTime = timestamp;
            
            const elapsed = (timestamp - startTime) % durationPerLoop;
            const progress = elapsed / durationPerLoop;
            
            const dims = getTimelineDimensions();
            const currentX = dims.startX + (progress * dims.totalWidth);
            playhead.style.left = `${currentX}px`;
            
            const currentStep = Math.floor(progress * totalSteps);
            
            if (currentStep !== lastTriggeredStep) {
                if (gridMD.children[currentStep] && gridMG.children[currentStep]) {
                    if (gridMD.children[currentStep].classList.contains('active')) {
                        createBeep(880, soundMDSelect.value, 0.1); 
                    }
                    if (gridMG.children[currentStep].classList.contains('active')) {
                        createBeep(330, soundMGSelect.value, 0.12); 
                    }
                }
                lastTriggeredStep = currentStep;
            }
            
            if (isPlaying) {
                animationFrameId = requestAnimationFrame(updateTimeline);
            }
        }

        function start() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const bpm = parseInt(bpmInput.value);
            durationPerLoop = (60 / bpm) * 4 * 1000; 
            
            startTime = 0;
            lastTriggeredStep = -1;
            isPlaying = true;
            playBtn.innerText = 'STOP';
            playBtn.style.background = '#ff5722';
            
            animationFrameId = requestAnimationFrame(updateTimeline);
        }

        function stop() {
            isPlaying = false;
            playBtn.innerText = 'PLAY';
            playBtn.style.background = '#00ffcc';
            cancelAnimationFrame(animationFrameId);
            resetPlayhead();
        }

        stepsSelect.addEventListener('change', (e) => {
            if (isPlaying) stop();
            totalSteps = parseInt(e.target.value);
            buildGrid();
            saveSettings();
        });

        bpmInput.addEventListener('input', saveSettings);
        soundMDSelect.addEventListener('change', saveSettings);
        soundMGSelect.addEventListener('change', saveSettings);
        
        volumeInput.addEventListener('input', (e) => {
            const val = e.target.value;
            volumeVal.innerText = val + '%';
            mainGainNode.gain.setValueAtTime(val / 100, audioCtx.currentTime);
            saveSettings();
        });

        function createBeep(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(mainGainNode);
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function loadSettings() {
            const saved = localStorage.getItem('aideRythmique_settings');
            if (!saved) {
                buildGrid();
                return;
            }
            
            const settings = JSON.parse(saved);
            
            bpmInput.value = settings.bpm;
            stepsSelect.value = settings.totalSteps;
            totalSteps = parseInt(settings.totalSteps);
            volumeInput.value = settings.volume;
            volumeVal.innerText = settings.volume + '%';
            mainGainNode.gain.setValueAtTime(settings.volume / 100, audioCtx.currentTime);
            soundMDSelect.value = settings.soundMD;
            soundMGSelect.value = settings.soundMG;
            
            buildGrid(settings.gridStateMD, settings.gridStateMG);
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) stop();
            else start();
        });

        window.addEventListener('resize', resetPlayhead);

        loadSettings();
    </script>
</body>
</html>
