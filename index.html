<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aide Rythmique</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.4rem; margin-bottom: 10px; color: #00ffcc; }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 15px 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label { font-weight: bold; font-size: 0.9rem; color: #bbb; }
        input[type="number"], select {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }
        input[type="range"] {
            width: 90px;
            accent-color: #00ffcc;
            cursor: pointer;
        }
        .volume-val {
            font-size: 0.8rem;
            color: #00ffcc;
            min-width: 28px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            color: #1a1a1a;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        #playBtn { background: #00ffcc; }
        #playBtn:hover { background: #00ccaa; }
        #clearBtn { background: #ffb300; }
        #clearBtn:hover { background: #e69d00; }
        
        .grid-container {
            position: relative;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }
        .row-label {
            width: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 11;
            background: #222;
        }
        .grid {
            display: grid;
            gap: 4px;
            flex-grow: 1;
            position: relative;
        }
        .cell {
            width: 100%;
            height: 38px;
            background: #3a3a3a;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.1s;
            box-sizing: border-box;
        }
        .row-md .cell.active { background: #ff5722; } /* Orange Main Droite */
        .row-mg .cell.active { background: #2196f3; } /* Bleu Main Gauche */
        
        #playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ffffff;
            box-shadow: 0 0 10px #ffffff;
            pointer-events: none;
            left: 40px;
            z-index: 10;
        }
        .time-labels {
            display: grid;
            gap: 4px;
            margin-left: 40px;
            margin-bottom: 5px;
            text-align: center;
            font-weight: bold;
            color: #888;
            font-size: 0.95rem;
            height: 20px;
        }
        .time-labels div {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>Aide Rythmique</h1>

    <div class="controls">
        <div class="controls-row">
            <div class="control-group">
                <label for="bpm">BPM :</label>
                <input type="number" id="bpm" value="60" min="40" max="240">
            </div>

            <div class="control-group">
                <label for="stepsSelect">Cases :</label>
                <select id="stepsSelect">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="6">6</option>
                    <option value="8" selected>8</option>
                    <option value="12">12</option>
                    <option value="16">16</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="volume">Vol :</label>
                <input type="range" id="volume" min="0" max="100" value="50">
                <span class="volume-val" id="volumeVal">50%</span>
            </div>

            <div class="btn-group">
                <button id="playBtn">PLAY</button>
                <button id="clearBtn">VIDER</button>
            </div>
        </div>

        <div class="controls-row">
            <div class="control-group">
                <label for="soundMD">Son MD :</label>
                <select id="soundMD">
                    <option value="piano" selected>🎹 Piano Électrique (Aigu)</option>
                    <option value="bell">🔔 Clochette / Boîte à Musique</option>
                    <option value="clap">🪵 Clap Percussion</option>
                    <option value="bass">🎸 Basse Ronde</option>
                </select>
            </div>

            <div class="control-group">
                <label for="soundMG">Son MG :</label>
                <select id="soundMG">
                    <option value="piano">🎹 Piano Électrique (Grave)</option>
                    <option value="bell">🔔 Clochette / Boîte à Musique</option>
                    <option value="clap" selected>🪵 Clap Percussion</option>
                    <option value="bass">🎸 Basse Ronde</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <div class="time-labels" id="timeLabels"></div>
        
        <div id="playhead"></div>

        <div class="row row-md">
            <div class="row-label">MD</div>
            <div class="grid" id="gridMD"></div>
        </div>

        <div class="row row-mg">
            <div class="row-label">MG</div>
            <div class="grid" id="gridMG"></div>
        </div>
    </div>

    <script>
        let totalSteps = 8;
        let isPlaying = false;
        
        let timerId = null;
        let animationFrameId = null;
        
        let notesInQueue = [];
        
        let nextNoteTime = 0.0;     
        let currentStepInLoop = 0;   
        let stepDuration = 0.0;      
        
        let wakeLock = null;

        const playBtn = document.getElementById('playBtn');
        const clearBtn = document.getElementById('clearBtn');
        const bpmInput = document.getElementById('bpm');
        const stepsSelect = document.getElementById('stepsSelect');
        const soundMDSelect = document.getElementById('soundMD');
        const soundMGSelect = document.getElementById('soundMG');
        const volumeInput = document.getElementById('volume');
        const volumeVal = document.getElementById('volumeVal');
        const playhead = document.getElementById('playhead');
        const gridMD = document.getElementById('gridMD');
        const gridMG = document.getElementById('gridMG');
        const timeLabels = document.getElementById('timeLabels');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const mainGainNode = audioCtx.createGain();
        mainGainNode.connect(audioCtx.destination);

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn(`Impossible de bloquer la veille : ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function saveSettings() {
            const activeMD = Array.from(gridMD.children).map(c => c.classList.contains('active'));
            const activeMG = Array.from(gridMG.children).map(c => c.classList.contains('active'));
            
            const settings = {
                bpm: bpmInput.value,
                totalSteps: stepsSelect.value,
                volume: volumeInput.value,
                soundMD: soundMDSelect.value,
                soundMG: soundMGSelect.value,
                gridStateMD: activeMD,
                gridStateMG: activeMG
            };
            localStorage.setItem('aideRythmique_settings', JSON.stringify(settings));
        }

        function buildGrid(savedMD = [], savedMG = []) {
            gridMD.innerHTML = '';
            gridMG.innerHTML = '';
            timeLabels.innerHTML = '';

            gridMD.style.gridTemplateColumns = `repeat(${totalSteps}, 1fr)`;
            gridMG.style.gridTemplateColumns = `repeat(${totalSteps}, 1fr)`;
            timeLabels.style.gridTemplateColumns = `repeat(${totalSteps}, 1fr)`;

            let labelStep = 1;
            if (totalSteps === 8) labelStep = 2;       
            if (totalSteps === 16) labelStep = 4;      
            if (totalSteps === 12) labelStep = 3;      
            if (totalSteps === 6) labelStep = 3;       

            for (let i = 0; i < totalSteps; i++) {
                const label = document.createElement('div');
                
                if (i % labelStep === 0) {
                    label.innerText = (i / labelStep) + 1;
                    label.style.color = '#00ffcc'; 
                } else {
                    label.innerText = ''; 
                }
                timeLabels.appendChild(label);

                const cellMD = document.createElement('div');
                cellMD.className = 'cell';
                if (savedMD[i]) cellMD.classList.add('active');
                cellMD.addEventListener('click', () => {
                    cellMD.classList.toggle('active');
                    saveSettings();
                });
                gridMD.appendChild(cellMD);

                const cellMG = document.createElement('div');
                cellMG.className = 'cell';
                if (savedMG[i]) cellMG.classList.add('active');
                cellMG.addEventListener('click', () => {
                    cellMG.classList.toggle('active');
                    saveSettings();
                });
                gridMG.appendChild(cellMG);
            }
            resetPlayhead();
        }

        function getTimelineDimensions() {
            const firstCell = gridMD.children[0];
            const lastCell = gridMD.children[gridMD.children.length - 1];
            if (!firstCell || !lastCell) return { startX: 40, totalWidth: 0 };

            const containerRect = document.querySelector('.grid-container').getBoundingClientRect();
            const firstRect = firstCell.getBoundingClientRect();
            const lastRect = lastCell.getBoundingClientRect();

            const startX = firstRect.left - containerRect.left;
            const totalWidth = lastRect.right - firstRect.left;

            return { startX, totalWidth };
        }

        function resetPlayhead() {
            const dims = getTimelineDimensions();
            playhead.style.left = `${dims.startX}px`;
        }

        function scheduleNote(step, time) {
            notesInQueue.push({ step: step, time: time });

            const cellsMD = gridMD.children;
            const cellsMG = gridMG.children;

            const bpm = parseInt(bpmInput.value);
            const loopDuration = (60.0 / bpm) * 4;
            const currentStepDuration = loopDuration / totalSteps;

            const mdActive = cellsMD[step] && cellsMD[step].classList.contains('active');
            const mgActive = cellsMG[step] && cellsMG[step].classList.contains('active');

            const targetGain = (mdActive && mgActive) ? 0.22 : 0.3;

            if (mdActive) {
                triggerCustomSound(soundMDSelect.value, 587.33, currentStepDuration, time, targetGain);
            }
            if (mgActive) {
                triggerCustomSound(soundMGSelect.value, 196.00, currentStepDuration, time, targetGain);
            }
        }

        function advanceNote() {
            const bpm = parseInt(bpmInput.value);
            const loopDuration = (60.0 / bpm) * 4;
            stepDuration = loopDuration / totalSteps;

            nextNoteTime += stepDuration;

            currentStepInLoop++;
            if (currentStepInLoop === totalSteps) {
                currentStepInLoop = 0;
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentStepInLoop, nextNoteTime);
                advanceNote();
            }
            timerId = setTimeout(scheduler, 25.0);
        }

        function updatePlayheadVisually() {
            if (!isPlaying) return;

            const currentTime = audioCtx.currentTime;

            while (notesInQueue.length > 1 && notesInQueue[1].time <= currentTime) {
                notesInQueue.shift();
            }

            if (notesInQueue.length > 0) {
                const currentNote = notesInQueue[0];
                
                let elapsedInStep = currentTime - currentNote.time;
                if (elapsedInStep < 0) elapsedInStep = 0;
                
                const progressInStep = Math.min(Math.max(elapsedInStep / stepDuration, 0), 1);

                const dims = getTimelineDimensions();
                const stepWidth = dims.totalWidth / totalSteps;
                
                const stepStartX = dims.startX + (currentNote.step * stepWidth);
                const currentX = stepStartX + (progressInStep * stepWidth);
                
                playhead.style.left = `${currentX}px`;
            }

            animationFrameId = requestAnimationFrame(updatePlayheadVisually);
        }

        function start() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isPlaying = true;
            playBtn.innerText = 'STOP';
            playBtn.style.background = '#ff5722';

            requestWakeLock();

            currentStepInLoop = 0;
            notesInQueue = [];
            const bpm = parseInt(bpmInput.value);
            const loopDuration = (60.0 / bpm) * 4;
            stepDuration = loopDuration / totalSteps;
            
            const startDelay = 0.05;
            nextNoteTime = audioCtx.currentTime + startDelay;

            scheduler();
            animationFrameId = requestAnimationFrame(updatePlayheadVisually);
        }

        function stop() {
            isPlaying = false;
            playBtn.innerText = 'PLAY';
            playBtn.style.background = '#00ffcc';
            
            releaseWakeLock();

            clearTimeout(timerId);
            cancelAnimationFrame(animationFrameId);
            resetPlayhead();
        }

        function triggerCustomSound(instrument, baseFreq, maxDuration, time, volumeCoeff) {
            const gainNode = audioCtx.createGain();
            gainNode.connect(mainGainNode);
            
            let noteDuration = maxDuration * 0.85;

            if (instrument === 'piano') {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                
                osc1.type = 'sine';
                osc1.frequency.value = baseFreq;
                
                osc2.type = 'triangle';
                osc2.frequency.value = baseFreq * 2;
                
                osc1.connect(gainNode);
                osc2.connect(subGain);
                subGain.connect(gainNode);
                subGain.gain.setValueAtTime(0.15, time);
                
                gainNode.gain.setValueAtTime(volumeCoeff, time);
                gainNode.gain.setValueAtTime(volumeCoeff, time + noteDuration * 0.3);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, time + noteDuration);
                
                osc1.start(time);
                osc2.start(time);
                osc1.stop(time + noteDuration);
                osc2.stop(time + noteDuration);

            } else if (instrument === 'bell') {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = baseFreq * 1.5;
                osc.connect(gainNode);
                
                gainNode.gain.setValueAtTime(volumeCoeff * 1.2, time);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, time + noteDuration * 1.2);
                
                osc.start(time);
                osc.stop(time + noteDuration * 1.2);

            } else if (instrument === 'clap') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, time);
                osc.frequency.exponentialRampToValueAtTime(40, time + 0.04);
                osc.connect(gainNode);
                
                gainNode.gain.setValueAtTime(volumeCoeff * 1.4, time);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, time + 0.05);
                
                osc.start(time);
                osc.stop(time + 0.06);

            } else if (instrument === 'bass') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = baseFreq * 0.5;
                osc.connect(gainNode);
                
                gainNode.gain.setValueAtTime(volumeCoeff * 1.1, time);
                gainNode.gain.linearRampToValueAtTime(0.00001, time + noteDuration);
                
                osc.start(time);
                osc.stop(time + noteDuration);
            }
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) stop();
            else start();
        });

        // Événement du bouton VIDER
        clearBtn.addEventListener('click', () => {
            if (isPlaying) stop();
            // On reconstruit la grille à vide
            buildGrid();
            // On sauvegarde l'état vide dans le stockage local
            saveSettings();
        });

        stepsSelect.addEventListener('change', (e) => {
            if (isPlaying) stop();
            totalSteps = parseInt(e.target.value);
            buildGrid();
            saveSettings();
        });

        bpmInput.addEventListener('input', saveSettings);
        soundMDSelect.addEventListener('change', saveSettings);
        soundMGSelect.addEventListener('change', saveSettings);
        
        volumeInput.addEventListener('input', (e) => {
            const val = e.target.value;
            volumeVal.innerText = val + '%';
            mainGainNode.gain.setValueAtTime(val / 100, audioCtx.currentTime);
            saveSettings();
        });

        function loadSettings() {
            const saved = localStorage.getItem('aideRythmique_settings');
            if (!saved) {
                buildGrid();
                return;
            }
            const settings = JSON.parse(saved);
            bpmInput.value = settings.bpm;
            stepsSelect.value = settings.totalSteps;
            totalSteps = parseInt(settings.totalSteps);
            volumeInput.value = settings.volume;
            volumeVal.innerText = settings.volume + '%';
            mainGainNode.gain.setValueAtTime(settings.volume / 100, audioCtx.currentTime);
            soundMDSelect.value = settings.soundMD;
            soundMGSelect.value = settings.soundMG;
            
            buildGrid(settings.gridStateMD, settings.gridStateMG);
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isPlaying) {
                requestWakeLock();
            }
        });

        window.addEventListener('resize', resetPlayhead);
        
        loadSettings();
    </script>
</body>
</html>
